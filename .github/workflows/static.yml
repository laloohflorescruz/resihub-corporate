name: Deploy via FTP

on:
  push:
    branches:
      - main  # Cambia esto si tu rama principal se llama 'master'

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files via Plain FTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            set net:timeout 60;
            set net:max-retries 2;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ${{ secrets.FTP_SERVER }};
            mirror -R ./ ${{ secrets.FTP_DIR }} --delete --verbose;
            bye
          "
